# 開発環境用Docker Compose設定（MinIO + PostgreSQL）
services:
  # MinIO S3互換ストレージサービス
  minio:
    image: minio/minio
    ports:
      - "9000:9000"  # S3 APIエンドポイント
      - "9001:9001"  # Web管理コンソール
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO初期化コンテナ（デフォルトバケット自動作成）
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/default-bucket --ignore-existing;
      echo 'デフォルトバケット default-bucket を作成しました';
      "

  # PostgreSQLデータベースサービス
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"  # PostgreSQL標準ポート
    environment:
      POSTGRES_USER: helpnavi
      POSTGRES_PASSWORD: helpnavi
      POSTGRES_DB: helpnavi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpnavi"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

# データ永続化用ボリューム定義
volumes:
  minio-data:
  postgres-data:
